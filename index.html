<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LLM Tutorial</title>
    <meta
      name="description"
      content="A structured tutorial for studying large language models from first principles."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css"
    />
    <style>
      :root {
        --theme-color: #2557a7;
        --text-color: #202632;
        --muted-color: #647084;
        --border-color: #d9e0ea;
        --surface-color: #ffffff;
        --soft-surface-color: #f6f8fb;
        --accent-color: #b45f06;
      }

      html {
        background: var(--soft-surface-color);
      }

      body {
        color: var(--text-color);
        background: var(--soft-surface-color);
        font-size: 16px;
        line-height: 1.7;
      }

      .app-name {
        margin: 0 0 1.25rem;
        padding: 1.6rem 1.4rem 0;
        text-align: left;
      }

      .app-name-link {
        color: var(--text-color);
        font-size: 1.18rem;
        font-weight: 700;
        letter-spacing: 0;
      }

      .sidebar {
        background: #f9fafc;
        border-right: 1px solid var(--border-color);
        padding-top: 0;
      }

      .sidebar > h1 {
        margin-top: 0;
      }

      .sidebar-nav {
        padding: 0 1rem 2rem;
      }

      .sidebar ul,
      .sidebar ul li {
        margin: 0;
      }

      .sidebar ul li a {
        border-radius: 6px;
        color: #334155;
        display: block;
        font-size: 0.94rem;
        line-height: 1.35;
        padding: 0.44rem 0.6rem;
        transition: background 120ms ease, color 120ms ease;
      }

      .sidebar ul li a:hover {
        background: #edf2f7;
        color: var(--text-color);
        text-decoration: none;
      }

      .sidebar ul li.active > a {
        background: #e7eef8;
        border-right: 3px solid var(--theme-color);
        color: var(--theme-color);
        font-weight: 650;
      }

      .sidebar ul li p {
        margin: 0;
      }

      .sidebar ul li p:not(:has(a)) {
        color: var(--muted-color);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin: 1.1rem 0 0.35rem;
        padding: 0 0.6rem;
        text-transform: uppercase;
      }

      .sidebar ul li p:has(a) {
        letter-spacing: 0;
        text-transform: none;
      }

      .search {
        border-bottom: 1px solid var(--border-color);
        margin: 0 1rem 1.1rem;
        padding: 0 0 1rem;
      }

      .search input {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        box-shadow: none;
        color: var(--text-color);
        font-size: 0.94rem;
        padding: 0.55rem 0.7rem;
      }

      .search input:focus {
        border-color: var(--theme-color);
        box-shadow: 0 0 0 3px rgba(37, 87, 167, 0.14);
      }

      .content {
        padding-top: 0;
      }

      .markdown-section {
        background: var(--surface-color);
        box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
        max-width: 960px;
        min-height: 100vh;
        padding: 3.2rem 4rem 5rem;
      }

      .markdown-section h1,
      .markdown-section h2,
      .markdown-section h3,
      .markdown-section h4 {
        color: #172033;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.25;
      }

      .markdown-section h1 {
        border-bottom: 1px solid var(--border-color);
        font-size: 2.25rem;
        margin: 0 0 1.65rem;
        padding-bottom: 0.9rem;
      }

      .markdown-section h2 {
        border-bottom: 1px solid #e7ecf3;
        font-size: 1.55rem;
        margin-top: 2.4rem;
        padding-bottom: 0.4rem;
      }

      .markdown-section h3 {
        color: #24324a;
        font-size: 1.22rem;
        margin-top: 1.9rem;
      }

      .markdown-section p,
      .markdown-section li {
        color: var(--text-color);
      }

      .markdown-section a {
        color: var(--theme-color);
        font-weight: 500;
      }

      .markdown-section a:hover {
        color: var(--accent-color);
      }

      .markdown-section ul,
      .markdown-section ol {
        padding-left: 1.45rem;
      }

      .markdown-section li {
        margin: 0.2rem 0;
      }

      .markdown-section blockquote {
        background: #f8fafc;
        border-left: 4px solid var(--theme-color);
        border-radius: 0 6px 6px 0;
        color: #435169;
        margin: 1.35rem 0;
        padding: 0.85rem 1.05rem;
      }

      .markdown-section code {
        background: #eef2f7;
        border-radius: 4px;
        color: #9a3412;
        font-size: 0.9em;
        padding: 0.12rem 0.28rem;
      }

      .markdown-section pre {
        background: #111827;
        border-radius: 8px;
        color: #e5e7eb;
        margin: 1.35rem 0;
        padding: 1rem 1.15rem;
      }

      .markdown-section pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .markdown-section img {
        border: 1px solid var(--border-color);
        border-radius: 8px;
        display: block;
        max-width: 100%;
        margin: 1.6rem auto;
      }

      .math-display {
        background: #fbfcfe;
        border: 1px solid #e4eaf2;
        border-radius: 8px;
        overflow-x: auto;
        margin: 1.25rem 0;
        padding: 0.8rem 1rem;
        text-align: center;
      }

      .math-display .katex {
        display: inline-block;
        text-align: initial;
      }

      .katex {
        font-size: 1.04em;
      }

      .sidebar-toggle {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        bottom: 1rem;
        left: 1rem;
        padding: 10px;
      }

      @media (max-width: 860px) {
        .markdown-section {
          box-shadow: none;
          min-height: auto;
          padding: 2.2rem 1.35rem 4rem;
        }

        .markdown-section h1 {
          font-size: 1.85rem;
        }

        .markdown-section h2 {
          font-size: 1.35rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: 'LLM Tutorial',
        repo: '',
        homepage: 'readme.md',
        loadSidebar: true,
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md',
        },
        subMaxLevel: 2,
        auto2top: true,
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: 'Search',
          noData: 'No results',
        },
        plugins: [
          function (hook) {
            var mathBlocks = [];
            var mathInlines = [];

            function escapeHtml(text) {
              return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            }

            hook.beforeEach(function (markdown) {
              mathBlocks = [];
              mathInlines = [];
              markdown = markdown.replace(
                /(^|\n)([ \t]*)\$\$\s*\n([\s\S]*?)\n[ \t]*\$\$(?=\n|$)/g,
                function (match, prefix, indent, body) {
                  var token = 'DOCSIFY_MATH_BLOCK_' + mathBlocks.length;
                  mathBlocks.push(body);
                  return prefix + indent + token;
                }
              );
              return markdown.replace(
                /(^|[^$\\])\$([^\n$]+?)\$/g,
                function (match, prefix, body) {
                  var token = 'DOCSIFY_MATH_INLINE_' + mathInlines.length;
                  mathInlines.push(body);
                  return prefix + token;
                }
              );
            });

            hook.afterEach(function (html, next) {
              for (var index = mathBlocks.length - 1; index >= 0; index -= 1) {
                var body = mathBlocks[index];
                var token = 'DOCSIFY_MATH_BLOCK_' + index;
                var block =
                  '<div class="math-display">$$\n' +
                  escapeHtml(body) +
                  '\n$$</div>';
                html = html.replace(new RegExp('<p>' + token + '</p>', 'g'), block);
                html = html.replace(new RegExp(token, 'g'), block);
              }
              for (var inlineIndex = mathInlines.length - 1; inlineIndex >= 0; inlineIndex -= 1) {
                var inlineBody = mathInlines[inlineIndex];
                var inlineToken = 'DOCSIFY_MATH_INLINE_' + inlineIndex;
                var inline = '$' + escapeHtml(inlineBody) + '$';
                html = html.replace(new RegExp(inlineToken, 'g'), inline);
              }
              next(html);
            });

            hook.doneEach(function () {
              if (window.renderMathInElement) {
                window.renderMathInElement(document.querySelector('#main'), {
                  delimiters: [
                    { left: '$$', right: '$$', display: true },
                    { left: '\\[', right: '\\]', display: true },
                    { left: '\\(', right: '\\)', display: false },
                    { left: '$', right: '$', display: false },
                  ],
                  throwOnError: false,
                });
              }
            });
          },
        ],
      };
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
